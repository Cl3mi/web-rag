services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: web-rag-db
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: web_rag_lab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d web_rag_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Frontend (SvelteKit, adapter-node).
  # Start with: docker compose --profile web up
  # Reads .env; DATABASE_HOST and OLLAMA_URL are overridden to use in-network hostnames.
  web:
    profiles: ["web"]
    build:
      context: .
    container_name: web-rag-web
    ports:
      - "3030:3000"
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      OLLAMA_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy

  # Ollama CPU. Optional — only needed when LLM_PROVIDER=ollama.
  # Start with: docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    container_name: web-rag-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 60s
      retries: 10
      start_period: 300s

  # Ollama with NVIDIA GPU support.
  # Start with: docker compose --profile gpu up
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: web-rag-ollama-gpu
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pgdata:
  ollama_data:
