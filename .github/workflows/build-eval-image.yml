name: Build eval image

on:
  push:
    tags:
      - 'eval-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. "0.1.0" → ghcr.io/<owner>/web-rag-eval:0.1.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/web-rag-eval

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          base="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          base="$(echo "$base" | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="${{ github.event.inputs.tag }}"
          else
            ref="${GITHUB_REF##*/eval-v}"
          fi
          echo "tags=${base}:${ref},${base}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: eval-dist/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
